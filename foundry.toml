[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.4"
evm_version = "istanbul"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@gnosis.pm/safe-contracts/=lib/safe-contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[lint]
# Vendored code — do not modify for lint suggestions
exclude_lints = ["asm-keccak256", "unused-import"]
